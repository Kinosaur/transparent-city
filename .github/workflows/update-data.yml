name: Update Traffy Data

# Runs every Monday at 09:00 Bangkok time (02:00 UTC)
# Also triggerable manually from GitHub Actions tab
on:
  schedule:
    - cron: '0 2 * * 1'
  workflow_dispatch:
    inputs:
      months:
        description: 'Number of recent months to re-download'
        required: false
        default: '2'

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to commit updated JSON files

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4.1.7

      - name: Set up Python
        uses: actions/setup-python@v5.1.1
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install Python dependencies
        run: pip install -r backend/requirements.txt

      # ── Restore cached CSVs ────────────────────────────────────────────────
      # CSVs are NOT committed to git (too large).
      # We cache them in GitHub Actions cache so we don't re-download every run.
      - name: Restore CSV cache
        uses: actions/cache@v4.0.2
        with:
          path: backend/data
          key: traffy-csvs-${{ hashFiles('backend/pipeline/download.py') }}
          restore-keys: traffy-csvs-

      - name: Download latest CSVs
        run: |
          MONTHS=${{ github.event.inputs.months || '2' }}
          python backend/pipeline/download.py --months $MONTHS
        continue-on-error: true

      # ── Run pipeline ───────────────────────────────────────────────────────
      - name: Run data pipeline
        run: |
          echo "▶ Checking for CSV files..."
          ls -lh backend/data/bangkok_*.csv 2>/dev/null || echo "No CSVs found"
          python backend/pipeline/process.py

      # ── Copy output to frontend ────────────────────────────────────────────
      - name: Copy JSON to frontend
        run: |
          mkdir -p frontend/public/data
          if [ -d backend/public/data ] && ls backend/public/data/*.json 1> /dev/null 2>&1; then
            cp backend/public/data/*.json frontend/public/data/
            echo "✓ Copied JSON files"
          else
            echo "⚠ No JSON files found in backend/public/data"
            exit 1
          fi

      # ── Commit only if data actually changed ───────────────────────────────
      - name: Commit updated data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add frontend/public/data/
          if git diff --staged --quiet; then
            echo "No data changes — skipping commit."
          else
            DATE=$(date -u +%Y-%m-%d)
            git commit -m "data: weekly update ${DATE} [skip ci]"
            git push
          fi
